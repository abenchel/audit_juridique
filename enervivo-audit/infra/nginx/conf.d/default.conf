# Route :
#   /api/*    → api:8000  (FastAPI)
#   /flower/* → flower:5555 (basic auth)
#   /*        → web:3000  (Next.js, NextAuth inclus dans /api/auth/*)
#
# Attention : NextAuth route ses callbacks sur /api/auth/* côté Next.js.
# Pour éviter le conflit avec FastAPI /api/*, on route explicitement :
#   /api/auth/*  → web   (NextAuth)
#   /api/*       → api   (FastAPI)
#
# Note : on n'utilise plus `upstream {}` parce que nginx ne ré-évalue les IPs
# qu'au démarrage → un rebuild de web/api donne une nouvelle IP que nginx ignore
# (→ 502 Connection refused). À la place : resolver DNS Docker (127.0.0.11)
# + variables dans proxy_pass → re-résolution à chaque requête.

server {
    listen 80 default_server;
    server_name _;

    # Resolver DNS interne Docker. valid=10s → cache de 10s puis re-résout.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---- Security headers (défense en profondeur XSS / clickjacking / sniffing) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://login.microsoftonline.com" always;
    # En prod HTTPS, décommenter :
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Healthcheck
    location = /nginx-health { return 200 "ok\n"; add_header Content-Type text/plain; }

    # ---- NextAuth (côté Next.js) ----
    location ^~ /api/auth/ {
        set $upstream_web "web:3000";
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # ---- FastAPI ----
    location ^~ /api/ {
        set $upstream_api "api:8000";
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (audit progress) — désactiver buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    # ---- Flower (admin only) ----
    location ^~ /flower/ {
        auth_basic "EnerVivo Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $upstream_flower "flower:5555";
        proxy_pass http://$upstream_flower;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js (frontend + WebSocket HMR en dev) ----
    location / {
        set $upstream_web "web:3000";
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
