user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # log_format "main" évite $request (qui inclut la query string) pour ne pas
    # logger le token SSE passé en ?token=... — on log méthode + path uniquement.
    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 75;
    client_max_body_size 100M;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Proxy buffers (SSE friendly)
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    include /etc/nginx/conf.d/*.conf;
}
